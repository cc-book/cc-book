name: Publish Book

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Build book
        env:
          BASE_URL: /cc-book
        run: make build

      # Reruns of this workflow attempt keep the previous attempt's
      # "github-pages" artifact around, which makes deploy-pages fail
      # with "Multiple artifacts named github-pages were found".
      - name: Remove github-pages artifact from earlier attempts
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            for (const artifact of data.artifacts) {
              if (artifact.name === "github-pages") {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/_build/html/

      - uses: actions/deploy-pages@v4
        id: deployment
